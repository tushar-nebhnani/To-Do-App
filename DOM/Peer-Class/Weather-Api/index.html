<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-container">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name..." spellcheck="false">
            <button id="search-btn">Search</button>
        </div>

        <div class="weather-info hidden" id="weather-info">
            <img src="https://openweathermap.org/img/wn/10d@2x.png" id="weather-icon" alt="Weather Icon">
            <h1 id="temp">--°C</h1>
            <h2 id="city-name">City Name</h2>

            <div class="temp-details">
                <p>Feels like: <span id="feels-like">--</span>°C</p>
                <div class="min-max">
                    <span>Min: <span id="temp-min">--</span>°C</span> | 
                    <span>Max: <span id="temp-max">--</span>°C</span>
                </div>
            </div>
            
            <div class="details">
                <div class="col">
                    <p class="label">Humidity</p>
                    <p id="humidity">--%</p>
                </div>
                <div class="col">
                    <p class="label">Wind Speed</p>
                    <p id="wind">-- km/h</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
