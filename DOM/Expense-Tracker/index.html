<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h2>Expense Tracker</h2>
        </header>

        <div class="balance-card">
            <p>Total Balance</p>
            <h1 id="balance">₹0.00</h1>
            <div class="card-chip"></div>
        </div>

        <div class="stats-container">
            <div class="stat-box income">
                <span>Income</span>
                <p id="money-plus">+₹0.00</p>
            </div>
            <div class="stat-box expense">
                <span>Expense</span>
                <p id="money-minus">-₹0.00</p>
            </div>
        </div>

        <div class="history-section">
            <h3>Recent Transactions</h3>
            <ul id="list" class="list">
                </ul>
        </div>

        <div class="form-section">
            <h3>New Transaction</h3>
            <form id="form">
                <input type="text" id="text" placeholder="Description (e.g. Salary, Coffee)" required />
                
                <div class="input-group">
                    <select id="type">
                        <option value="credit">Credit (+)</option>
                        <option value="debit">Debit (-)</option>
                    </select>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" required />
                </div>

                <button type="submit" class="btn" id="add-btn">Add Transaction</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
